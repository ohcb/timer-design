<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cube Timer Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="timer-container">
    
    <header class="scramble-section">
      <p class="scramble-text">U2 F2 U' R2 D B2 F2 D L2 U' L2 B2 L U' B' L' D' U2 L R' B R'</p>
    </header>

    <main class="timer-main">
      <div class="timer-display">0.00</div>
      <div class="timer-summary">
        <span>ao5: 8.94</span>
        <span>ao12: -</span>
      </div>
    </main>

    <footer class="dashboard-section">
      
      <div class="panel history-panel">
        <h3>최근 기록</h3>
        <ul class="history-list">
          <li><span class="index">5.</span> <span class="time good">8.96</span> <span class="actions"><button>+2</button><button>DNF</button></span></li>
          <li><span class="index">4.</span> <span class="time best">8.56</span> <span class="actions"><button>+2</button><button>DNF</button></span></li>
          <li><span class="index">3.</span> <span class="time good">8.93</span> <span class="actions"><button>+2</button><button>DNF</button></span></li>
          <li><span class="index">2.</span> <span class="time">9.52</span> <span class="actions"><button>+2</button><button>DNF</button></span></li>
          <li><span class="index">1.</span> <span class="time">8.95</span> <span class="actions"><button>+2</button><button>DNF</button></span></li>
        </ul>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">pb</span>
          <span class="stat-value">8.56</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">worst</span>
          <span class="stat-value">9.52</span>
        </div>
        <div class="stat-cardHighlight">
          <span class="stat-label">ao5</span>
          <span class="stat-value">8.94</span>
        </div>
        <div class="stat-cardHighlight">
          <span class="stat-label">ao5 pb</span>
          <span class="stat-value">8.94</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">ao12</span>
          <span class="stat-value">-</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">ao100</span>
          <span class="stat-value">-</span>
        </div>
      </div>

    </footer>
  </div>
</body>
</html>
